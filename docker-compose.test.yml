services:
  db-test:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: claude_memory_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d claude_memory_test"]
      interval: 5s
      timeout: 5s
      retries: 5
