name: CI
on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm dep-check
      - run: pnpm build
      - name: Install Graphviz
        run: sudo apt-get install -y graphviz
      - name: Generate docs (without DB)
        run: SKIP_DB_DOCS=true pnpm docs:generate
      - name: Check docs are up to date
        run: |
          if ! git diff --exit-code docs/generated/mcp-tools.md; then
            echo "::error::Generated docs are out of date. Run 'pnpm docs:generate' and commit the results."
            git diff docs/generated/mcp-tools.md
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start test DB
        run: docker compose -f docker-compose.test.yml up -d --build --wait
      - name: Setup DB extensions
        run: |
          PGPASSWORD=test psql -h localhost -p 5434 -U test -d claude_memory_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_bigm;"
      - name: Run DB migrations
        run: |
          for f in $(ls packages/storage-postgres/drizzle/*.sql | sort); do
            echo "Applying migration: $f"
            PGPASSWORD=test psql -h localhost -p 5434 -U test -d claude_memory_test -f "$f"
          done
      - name: Install tbls
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/k1LoW/tbls/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/k1LoW/tbls/releases/download/${VERSION}/tbls_${VERSION}_linux_amd64.tar.gz" | tar xz
          sudo mv tbls /usr/local/bin/
      - name: Generate DB schema docs
        run: pnpm docs:schema
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test
      - name: Check DB schema docs are up to date
        run: |
          if ! git diff --exit-code docs/generated/schema/; then
            echo "::error::DB schema docs are out of date. Run 'pnpm docs:generate' with DB running and commit."
            git diff docs/generated/schema/
            exit 1
          fi
      - name: Run tests with coverage
        run: pnpm -r run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test
