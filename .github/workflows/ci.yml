name: CI
on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm dep-check
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start test DB
        run: docker compose -f docker-compose.test.yml up -d --build --wait
      - name: Setup DB schema
        run: |
          PGPASSWORD=test psql -h localhost -p 5434 -U test -d claude_memory_test <<'SQL'
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS pg_bigm;
            CREATE TABLE IF NOT EXISTS memories (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              content TEXT NOT NULL,
              embedding vector(384),
              session_id TEXT,
              project_path TEXT,
              tags TEXT[],
              source TEXT,
              created_at TIMESTAMPTZ NOT NULL DEFAULT now(),
              updated_at TIMESTAMPTZ NOT NULL DEFAULT now(),
              last_accessed_at TIMESTAMPTZ NOT NULL DEFAULT now()
            );
            CREATE INDEX IF NOT EXISTS idx_memories_bigm ON memories USING gin(content gin_bigm_ops);
            CREATE INDEX IF NOT EXISTS idx_memories_vector ON memories USING hnsw(embedding vector_cosine_ops);
          SQL
      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export draw.io diagrams
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/diagrams
          format: png
          output: docs/images
        continue-on-error: true
