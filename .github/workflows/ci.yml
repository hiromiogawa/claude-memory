name: CI
on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm dep-check
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: claude_memory_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Setup DB extensions
        run: |
          PGPASSWORD=test psql -h localhost -p 5434 -U test -d claude_memory_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export draw.io diagrams
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/diagrams
          format: png
          output: docs/images
        continue-on-error: true
