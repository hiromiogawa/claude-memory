name: CI
on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm dep-check
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start test DB
        run: docker compose -f docker-compose.test.yml up -d --build --wait
      - name: Run DB migrations
        run: pnpm --filter @claude-memory/storage-postgres db:push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test
      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5434/claude_memory_test

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export draw.io diagrams
        uses: rlespinasse/drawio-export-action@v2
        with:
          path: docs/diagrams
          format: png
          output: docs/images
        continue-on-error: true
