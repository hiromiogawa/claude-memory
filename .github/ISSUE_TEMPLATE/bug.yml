name: "Bug"
description: "不具合報告"
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: "何が起きたか"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "期待する動作"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: "再現手順"
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "環境"
      description: "OS, Node.js version, Docker version 等"
