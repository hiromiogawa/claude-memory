pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,json}"
      run: pnpm biome check --write {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{ts,tsx,js}"
      run: pnpm oxlint -c .oxlintrc.json {staged_files}
    knip:
      run: pnpm knip
    dep-check:
      run: pnpm dep-check

pre-push:
  commands:
    knip-full:
      run: pnpm knip

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
