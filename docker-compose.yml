services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: claude_memory
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d claude_memory"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://memory:memory@db:5432/claude_memory
      EMBEDDING_MODEL: intfloat/multilingual-e5-small
      EMBEDDING_DIMENSION: "384"
      DB_POOL_SIZE: "10"
    volumes:
      # Hugging Face モデルキャッシュをホストと共有。session-start/end の host 側 hook と
      # モデルを二重ダウンロードせず、image にも焼き込まない。初回はインターネット接続必須。
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface

volumes:
  pgdata:
